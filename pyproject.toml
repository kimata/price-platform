[project]
name = "price-platform"
version = "0.1.0"
description = "Shared webapp and auth foundation for product price applications"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "argon2-cffi>=23.1.0",
    "flask>=3.0.0",
    "flask-cors>=6.0.0",
    "PyJWT>=2.8.0",
]
authors = [
    { name = "KIMATA Tetsuya", email = "kimata@green-rabbit.net" }
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/price_platform"]
